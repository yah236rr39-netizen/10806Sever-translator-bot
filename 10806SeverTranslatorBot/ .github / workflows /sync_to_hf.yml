name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] # 當 main 分支有更新時觸發
  force_push:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          #10806SeverTranslatorBot
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/10806SeverTranslatorBot main
